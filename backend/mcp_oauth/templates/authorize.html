<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hiking Food — Authorize</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 5rem auto; padding: 0 1rem; color: #172018; }
    h1 { font-size: 1.4rem; } .meta { color: #58635a; font-size: .9rem; }
    label { display: block; margin-top: 1.5rem; margin-bottom: .4rem; }
    input[type=password] { width: 100%; box-sizing: border-box; padding: .7rem; font-size: 1rem; }
    button { margin-top: 1rem; padding: .65rem 1.1rem; font-size: 1rem; cursor: pointer; }
    .error { color: #a11; }
  </style>
</head>
<body>
  <h1>Hiking Food Planner</h1>
  <p class="meta"><strong>{{ client_id }}</strong> is requesting access to read and update your trip food plans.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ authorize_action }}">
    <input type="hidden" name="client_id" value="{{ client_id }}">
    <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
    <input type="hidden" name="scope" value="{{ scope }}">
    <input type="hidden" name="state" value="{{ state }}">
    <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
    <label for="password">Hiking Food password</label>
    <input id="password" type="password" name="password" required autofocus>
    <button type="submit">Authorize</button>
  </form>
</body>
</html>
